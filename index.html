<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#06101d">
  <title>Jarvis WebApp</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <section class="top">
    <div>
      <p class="eyebrow">Notebook · Phone WebApp</p>
      <h1>Jarvis</h1>
      <p class="sub">노트북과 핸드폰에서 같이 쓰는 개인 비서 웹앱</p>
    </div>
    <div class="status"><span id="statusDot"></span><strong id="statusText">대기 중</strong></div>
  </section>

  <section class="hero">
    <div class="orb" id="orb"><span></span></div>
    <p class="hint">핸드폰은 Chrome에서 접속 후 “홈 화면에 추가”하면 앱처럼 사용할 수 있습니다.</p>
    <button id="listenBtn" class="primary big">🎙️ 자비스 부르기</button>
    <div class="row">
      <button id="stopBtn">중지</button>
      <button id="clearBtn">대화 지우기</button>
    </div>
  </section>

  <section class="inputBox">
    <input id="textInput" placeholder="예: 자비스, 메모 태양광 견적 확인">
    <button id="sendBtn" class="primary">보내기</button>
  </section>

  <section class="grid">
    <article class="panel chatPanel">
      <h2>대화</h2>
      <div id="chat" class="chat"></div>
    </article>

    <article class="panel">
      <h2>메모</h2>
      <ul id="memoList"></ul>
      <button id="deleteMemoBtn">메모 전체 삭제</button>
    </article>

    <article class="panel">
      <h2>빠른 계산</h2>
      <p class="small">예: 1502 나누기 30, 12*8+5</p>
      <input id="calcInput" placeholder="계산식 입력">
      <button id="calcBtn" class="primary">계산</button>
      <div id="calcResult" class="result"></div>
    </article>

    <article class="panel">
      <h2>예시 명령</h2>
      <div class="chips">
        <button class="chip">자비스, 메모 태양광 철거 견적 확인</button>
        <button class="chip">자비스, 메모 보여줘</button>
        <button class="chip">자비스, 1502 나누기 30 계산해줘</button>
        <button class="chip">자비스, 안녕</button>
      </div>
    </article>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
